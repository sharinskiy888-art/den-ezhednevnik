<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f2f2f7">
  <title>Смена пароля — День</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;min-height:100dvh;display:grid;place-items:center;padding:20px;background:#f2f2f7;color:#172231;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.card{width:min(420px,100%);padding:28px 22px;border:1px solid #dfe3e8;border-radius:18px;background:white;box-shadow:0 12px 40px rgba(24,34,49,.09)}.mark{width:52px;height:52px;display:grid;place-items:center;margin-bottom:18px;border-radius:14px;background:#214d78;color:white;font-size:24px;font-weight:800}h1{margin:0 0 8px;font-size:25px}p{margin:0 0 20px;color:#687486;font-size:14px;line-height:1.5}label{display:grid;gap:7px;margin:0 0 15px;color:#555f6d;font-size:12px;font-weight:700}input{width:100%;padding:13px;border:1px solid #d8dee5;border-radius:10px;font:inherit;font-size:16px;outline:none}input:focus{border-color:#2161a1;box-shadow:0 0 0 3px #e6f0fa}button,.link{width:100%;display:block;border:0;border-radius:10px;padding:13px 16px;background:#214d78;color:white;font:inherit;font-weight:750;text-align:center;text-decoration:none}button:disabled{opacity:.55}.secondary{margin-top:9px;background:#edf1f5;color:#214d78}.status{margin:14px 0 0;min-height:20px;color:#b43b33;font-size:12px}.success{color:#237a60} [hidden]{display:none!important}
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">Д</div>
    <section id="loadingPanel"><h1>Проверяем ссылку…</h1><p>Это займёт несколько секунд.</p></section>
    <section id="resetPanel" hidden>
      <h1>Придумайте новый пароль</h1><p>Введите новый пароль два раза. Старый пароль больше не потребуется.</p>
      <form id="resetForm">
        <label>Новый пароль<input id="password" type="password" minlength="8" required autocomplete="new-password" placeholder="Не менее 8 символов"></label>
        <label>Повторите пароль<input id="confirmPassword" type="password" minlength="8" required autocomplete="new-password"></label>
        <button id="saveButton" type="submit">Сохранить новый пароль</button>
        <div class="status" id="status" role="status"></div>
      </form>
    </section>
    <section id="resultPanel" hidden>
      <h1 id="resultTitle">Пароль изменён</h1><p id="resultText">Теперь можно войти в ежедневник с новым паролем.</p>
      <a class="link" href="./?v=34">Открыть ежедневник</a>
      <a class="link secondary" href="./?v=34" id="retryLink">Вернуться ко входу</a>
    </section>
  </main>
  <script src="sync-config.js?v=34"></script>
  <script>
    const hash = new URLSearchParams(location.hash.replace(/^#/, '')); const query = new URLSearchParams(location.search);
    const accessToken = hash.get('access_token') || query.get('access_token'); const type = hash.get('type') || query.get('type');
    const errorText = hash.get('error_description') || query.get('error_description') || hash.get('error') || query.get('error');
    const loading = document.querySelector('#loadingPanel'); const resetPanel = document.querySelector('#resetPanel'); const resultPanel = document.querySelector('#resultPanel');
    function showResult(title, text, error = false) { loading.hidden = true; resetPanel.hidden = true; resultPanel.hidden = false; document.querySelector('#resultTitle').textContent = title; document.querySelector('#resultText').textContent = text; document.querySelector('#resultTitle').style.color = error ? '#b43b33' : '#237a60'; document.querySelector('#retryLink').hidden = !error; }
    async function initialize() {
      if (errorText) { showResult('Ссылка недействительна', errorText.replace(/\+/g, ' ') + '. Запросите новое письмо.', true); return; }
      if (!accessToken) { showResult('Код восстановления не найден', 'Эта ссылка неполная или уже использована. Запросите новое письмо.', true); return; }
      if (type && type !== 'recovery') {
        try {
          const response = await fetch(`${SUPABASE_CONFIG.url}/auth/v1/user`, { headers: { apikey: SUPABASE_CONFIG.anonKey, Authorization: `Bearer ${accessToken}` } });
          const user = response.ok ? await response.json() : null; if (user) localStorage.setItem('day-sync-session-v1', JSON.stringify({ access_token: accessToken, refresh_token: hash.get('refresh_token') || '', expires_at: Math.floor(Date.now()/1000) + Number(hash.get('expires_in') || 3600), user }));
        } catch {}
        location.replace('./?auth=confirmed&v=34'); return;
      }
      history.replaceState(null, '', 'reset.html?recovery=1'); loading.hidden = true; resetPanel.hidden = false; document.querySelector('#password').focus();
    }
    document.querySelector('#resetForm').addEventListener('submit', async event => {
      event.preventDefault(); const password = document.querySelector('#password').value; const confirm = document.querySelector('#confirmPassword').value; const status = document.querySelector('#status'); const button = document.querySelector('#saveButton');
      if (password !== confirm) { status.textContent = 'Пароли не совпадают.'; return; }
      button.disabled = true; status.textContent = 'Сохраняем новый пароль…'; status.className = 'status';
      try {
        const response = await fetch(`${SUPABASE_CONFIG.url}/auth/v1/user`, { method: 'PUT', headers: { apikey: SUPABASE_CONFIG.anonKey, Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ password }) });
        if (!response.ok) { const body = await response.json().catch(() => ({})); throw new Error(body.message || body.msg || 'Не удалось изменить пароль'); }
        status.className = 'status success'; showResult('Пароль изменён', 'Теперь откройте ежедневник и войдите с новым паролем.');
      } catch (error) { status.textContent = `${error.message}. Запросите новое письмо, если ссылка устарела.`; button.disabled = false; }
    });
    initialize();
  </script>
</body>
</html>
